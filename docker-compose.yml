services:
  db:
    image: mysql:8.4
    env_file: .env.docker
    ports: ["3310:3306"]
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:latest
  
  alembic:
    build:
      context: .
      dockerfile: docker/alembic.Dockerfile
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env.docker
    ports: ["8000:8000"]
    depends_on:
      alembic:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env.docker
    depends_on:
      alembic:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  mysqldata:
